{% load static %}
<!DOCTYPE html>
<html lang="es" data-static-prefix="{% get_static_prefix %}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page_title }}</title>
  <meta name="description" content="{{ page_description }}">
  <meta name="theme-color" content="#0b1f33">
  <link rel="icon" type="image/png" href="{% static 'assets/brand/max-services-symbol-real-v2.png' %}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="{% static 'css/styles.css' %}">
  {% block extra_css %}{% endblock %}
</head>
<body
  class="site-body"
  data-home-url="{% url 'core:home' %}"
  data-projects-url="{% url 'portfolio:projects_index' %}"
>
  {% block page %}{% endblock %}
  {% if project_catalog %}
    {{ project_catalog|json_script:"projects-catalog-data" }}
  {% endif %}
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <script src="{% static 'js/site-navigation.js' %}"></script>
  <script src="{% static 'js/projects-shared.js' %}"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
